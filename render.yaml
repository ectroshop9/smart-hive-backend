services:
  - type: web
    name: smart-hive-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn smart_hive_cloud.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: smart_hive_cloud.settings
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: DEBUG
        value: "False"
